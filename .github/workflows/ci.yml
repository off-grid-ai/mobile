name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  test:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install JS dependencies
        run: npm ci

      - name: Run Jest tests
        run: npx jest --coverage --forceExit

      - name: Run Android tests
        run: cd android && ./gradlew :app:testDebugUnitTest --rerun-tasks

      - name: Run iOS tests
        run: |
          cd ios && xcodebuild test \
            -workspace OffgridMobile.xcworkspace \
            -scheme OffgridMobile \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:OffgridMobileTests \
            2>&1 | (xcpretty 2>/dev/null || cat)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload iOS test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          if-no-files-found: ignore

      - name: Upload Android test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: android/app/build/reports/tests/
          if-no-files-found: ignore

  fastlane-build:
    # Verifies the fastlane release pipeline (build-only, no upload, no store secrets).
    # Runs on the clean CI environment where JDK 17 + Android SDK are set up correctly.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm ci

      - name: Fastlane android build (no upload)
        run: bundle exec fastlane android build

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fastlane-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  pro-build:
    # Full build WITH the private @offgrid/pro submodule.
    #
    # Security: this job needs PRO_REPO_TOKEN (read access to the private pro repo), so it
    # must NEVER run for pull requests — a public/fork PR that could read this token would
    # leak the closed-source pro code. The `if` gate restricts it to push events on this
    # repo's own branches/tags. Fork PRs and normal `pull_request` runs skip this job and
    # get the free/stub build (metro aliases @offgrid/pro -> proStub.js when pro/ is absent),
    # which is the correct behavior for open-source contributions.
    #
    # PRO_REPO_TOKEN lives in the protected `pro-build` GitHub Environment (maintainer-only),
    # so it is unreachable from any workflow context except this gated push job.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pro-build

    steps:
      - name: Checkout code + private pro submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Token with read-only access to off-grid-ai/mobile-pro only. Used to fetch the
          # private submodule; scoped so a leak cannot write or reach other repos.
          token: ${{ secrets.PRO_REPO_TOKEN }}

      - name: Verify pro submodule is present
        run: |
          if [ ! -f pro/package.json ]; then
            echo "::error::pro submodule did not check out — PRO_REPO_TOKEN missing or lacks access"
            exit 1
          fi
          echo "pro submodule present ✓"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build Android Release (with pro)
        run: cd android && ./gradlew assembleRelease
